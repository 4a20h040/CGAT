<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>誰有上班</title>
</head>

<body>

<h2>誰有上班（測試版）</h2>

<div id="app"></div>

<script>
// ====== 假資料 ======
const DB = {
  members: [
    {id:'m1', name:'張小明'},
    {id:'m2', name:'林小美'}
  ]
};

let currentUser = null;

// ====== 初始化 ======
function init(){
  renderIdentity();
}

// ====== 選人畫面 ======
function renderIdentity(){
  const el = document.getElementById("app");

  el.innerHTML = `
    <h3>請選擇你的名字</h3>
    ${DB.members.map(m => `
      <button onclick="selectUser('${m.id}')">${m.name}</button>
    `).join("")}
  `;
}

// ====== 選擇使用者 ======
function selectUser(id){
  currentUser = DB.members.find(m => m.id === id);
  renderMain();
}

// ====== 主畫面 ======
function renderMain(){
  const el = document.getElementById("app");

  el.innerHTML = `
    <h3>歡迎 ${currentUser.name}</h3>
    <button onclick="renderIdentity()">切換身份</button>
  `;
}

// ====== 啟動 ======
window.onload = init;
</script>

</body>
</html>
